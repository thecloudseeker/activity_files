version: 0.5.1
repository: https://github.com/thecloudseeker/activity_files
issue_tracker: https://github.com/thecloudseeker/activity_files/issues
topics:
  - health
  - fitness
  - workout
  - converter
  - sports

environment:
  sdk: ^3.9.0

dependencies:
  async: ^2.13.1
  args: ^2.7.0
  collection: ^1.19.1
  xml: ^7.0.1
  csv: ^8.0.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
